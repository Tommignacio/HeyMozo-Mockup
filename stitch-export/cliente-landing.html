<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>La Trattoria - Mesa 4</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13eca7",
                        "background-light": "#1c1c1e",
                        "background-dark": "#1c1c1e",
                        "brand-purple": "#9333ea",
                        "brand-amber": "#f59e0b",
                        "brand-green": "#16a34a",
                        "footer-gray": "#6b7280"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #1c1c1e;
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-[#1c1c1e] min-h-[100dvh] flex flex-col font-display selection:bg-primary/30 text-white text-center">
<div class="flex-1 flex flex-col items-center">
<!-- Top Navigation / Logo -->
<header class="pt-12 pb-6 flex flex-col items-center justify-center">
<div class="flex items-center gap-3 mb-8">
<div class="bg-[#e8362a] p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl shrink-0">restaurant</span>
</div>
<span class="text-white text-xl font-black tracking-tight">Mi Resto</span>
</div>
</header>
<main class="flex-1 flex flex-col items-center px-6 w-full max-w-sm mx-auto">
<!-- Welcome Message - Simplified -->
<div class="mb-10">
<h1 class="text-[#e5e7eb] text-xl font-semibold">¡Hola! Estás en la Mesa 4</h1>
</div>
<!-- Action Buttons Stack -->
<div class="w-full flex flex-col gap-5">
<!-- Menu & Order -->
<button class="w-full px-6 py-5 bg-brand-purple text-white rounded-2xl flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined text-2xl">restaurant_menu</span>
<span class="text-lg font-bold">Ver Menú y Pedir</span>
</button>
<!-- Call Waiter - Converted to secondary -->
<button class="w-full px-6 py-5 bg-[#2c2c2e] text-white border border-[#3a3a3c] rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined text-2xl text-[#9ca3af]">notifications_active</span>
<span class="text-lg font-medium">Llamar al Mozo</span>
</button>
<!-- Payment -->
<button class="w-full px-6 py-5 bg-brand-green text-white rounded-2xl flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined text-2xl">credit_card</span>
<span class="text-lg font-bold">Pagar / Dejar Propina</span>
</button>
</div>
<!-- Feedback Section -->
<div class="mt-12 mb-12">
<a class="inline-flex items-center gap-2 text-footer-gray hover:text-primary transition-colors duration-200" href="#">
<span class="text-sm font-medium">⭐ ¿Cómo te atendimos? Dejanos tu opinión</span>
</a>
</div>
</main>
</div>
<!-- Footer Attribution -->
<footer class="px-6 py-8 w-full">
<div class="pt-6 border-t border-[#3a3a3c] flex flex-col items-center gap-1">
<div class="flex items-center justify-center gap-1.5 text-xs text-gray-600 font-medium">
<span class="material-symbols-outlined text-[14px] text-[#e8362a]">restaurant</span>
<span>Tecnología HeyMozo</span>
</div>
</div>
</footer>
<!-- Background Decoration (Subtle Glow) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-brand-purple/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
